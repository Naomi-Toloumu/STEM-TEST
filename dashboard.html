<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>System Report Dashboard</title>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get("from") !== "home") {
      window.location.href = "home.html";
    }
  </script>

  <script src="dataTable.js" defer></script>
  <script src="parse.js" defer></script>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: radial-gradient(circle at top, #2b2b45, #12121a);
      color: white;
      padding: 20px;
    }
  
    h1 {
      margin-bottom: 20px;
      color: #ffffff;
    }
  
    h2, h3 {
      color: #dcdcff;
    }
  
    .container {
      display: flex;
      gap: 20px;
    }
  
    .left-panel, .right-panel {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
      flex: 1;
      display: flex;
      flex-direction: column;
    }
  
    select, button, input[type="file"] {
      padding: 10px;
      margin-top: 10px;
      width: 100%;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }
  
    select {
      background: #2f2f4f;
      color: white;
    }
  
    input[type="file"] {
      background: #2f2f4f;
      color: #ccc;
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border-radius: 8px;
    }
    
    /* Fix inner button + text alignment */
    input[type="file"]::file-selector-button {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      border: none;
      color: white;
      padding: 8px 12px;
      margin-right: 10px;
      border-radius: 6px;
      cursor: pointer;
    }
    
    input[type="file"]::file-selector-button:hover {
      box-shadow: 0 0 10px rgba(0, 242, 254, 0.6);
    }
  
    button {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
      cursor: pointer;
      transition: 0.25s ease;
    }
  
    button:hover {
      transform: scale(1.03);
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.7);
    }
  
    .stat-box {
      background: rgba(255,255,255,0.08);
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border-left: 4px solid #4facfe;
    }
  
    canvas {
      border: 1px solid rgba(255,255,255,0.2);
      margin-top: 20px;
      border-radius: 6px;
      background: #111122;
    }
  </style>
</head>
<body>

  <h1>System Report Dashboard</h1>

  <div class="container">

    <div class="left-panel">
      <h2>Select Report</h2>

      <!-- Optional: keep file input if user wants to load another CSV -->
      <input type="file" id="file" accept=".csv">

      <select id="reportSelect">
        <option value="battery">Battery Report (Currently the only working one)</option>
        <option value="altimeter">Altimeter Report</option>
        <option value="gps">GPS Report</option>
        <option value="imu">IMU Report</option>
        <option value="motor">Motor Report</option>
        <option value="pressure">Pressure Report</option>
        <option value="temperature">Temperature Report</option>
        <option value="power">Power Report</option>
        <option value="thruster">Thruster Report</option>
      </select>

      <button onclick="generateReport()">Generate Report</button>

      <h3>Graph</h3>
      <canvas id="graph" width="500" height="300"></canvas>
    </div>

    <div class="right-panel">
      <h2 id="reportTitle">Report Output</h2>
      <div id="stats"></div>
    </div>

  </div>

<script>
// ---------------------------------------------CALCULATOR--------------------------------------------- 
function calculateStats(values) {
  const numeric = values
    .map(v => parseFloat(v))
    .filter(v =>
      !isNaN(v) &&
      v !== 0 &&
      v !== -999 &&
      v !== -99.999 &&
      v !== -999.99
    ); 

  if (numeric.length === 0) return null;

  const sum = numeric.reduce((a, b) => a + b, 0);
  const avg = sum / numeric.length;
  const min = Math.min(...numeric);
  const max = Math.max(...numeric);

  if (min === max) return null;

  return { avg, min, max }; 
}

// ---------------------------------------------REPORT GENERATOR--------------------------------------------- 
async function generateReport() {
  const reportSelect = document.getElementById("reportSelect");
  const selectedReport = reportSelect.value;

  // If generate report is hit and nothing is uploaded, default to selected option from dropdown (only works for battery so far)
  if (selectedReport === "battery" && !window.currentDataTable) {
    const fileName = 'ElectCellVoltagesFullsansDuplicates.csv';
    try {
      const response = await fetch(fileName);
      if (!response.ok) throw new Error('CSV file not found');
      const csvText = await response.text();

      if (typeof toDataTable === 'function') {
        window.currentDataTable = toDataTable(csvText, fileName);
      } else {
        console.error('toDataTable function not found. Make sure parse.js is loaded.');
        const statsDiv = document.getElementById("stats");
        statsDiv.innerHTML = "<div class='stat-box'>Parsing function missing. Please check parse.js.</div>";
        return;
      }
    } catch (err) {
      console.error('Failed to load CSV:', err);
      const statsDiv = document.getElementById("stats");
      statsDiv.innerHTML = "<div class='stat-box'>Failed to load Battery CSV. Please upload manually.</div>";
      return;
    }
  }

  const dt = window.currentDataTable;
  const statsDiv = document.getElementById("stats");
  const title = document.getElementById("reportTitle");
  const canvas = document.getElementById("graph");
  const ctx = canvas.getContext("2d");

  statsDiv.innerHTML = "";
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!dt || !dt.headers || dt.headers.length === 0) {
    title.innerText = "No Data Loaded";
    statsDiv.innerHTML = "<div class='stat-box'>Please upload a CSV first.</div>";
    return;
  }

  title.innerText = "Dynamic Report: " + (dt.meta?.sourceFileName || "");

  const numericColumns = [];

  dt.headers.forEach((header, index) => {
    if (index === 0 || index === 1 || index === 2) return;

    const values = dt.rows.map(row => row[header]);
    const stats = calculateStats(values);
    if (stats) {
      numericColumns.push({ header, stats });
    }
  });

  if (numericColumns.length === 0) {
    statsDiv.innerHTML = "<div class='stat-box'>No numeric columns detected.</div>";
    return;
  }

  // CHANGE START
  const padding = {
    left: 20,
    right: 20,
    top: 20,
    bottom: 20
  };

  const graphWidth = canvas.width - passing.left - padding.right;
  const graphHeight = canvas.height - padding.top - padding.bottom

  const maxAvg = Math.max(...numericColumns.map(c => c.stats.avg));

  ctx.textAlign = "center";
  ctx.font = "12px Arial";

  // CHANGE END

  let x = 60;
  const barWidth = 40;
  const scaleFactor = 50;

  numericColumns.forEach(col => {
    const { header, stats } = col;
    const avgFixed = stats.avg.toFixed(2);

    const box = document.createElement("div");
    box.className = "stat-box";
    box.innerHTML = `<strong>${header}</strong><br>
                     Average: ${avgFixed}<br>
                     Min: ${stats.min}<br>
                     Max: ${stats.max}`;
    statsDiv.appendChild(box);

    const barHeight = stats.avg * scaleFactor;

    ctx.fillStyle = "gray";
    ctx.fillRect(x, canvas.height - barHeight - 40, barWidth, barHeight);

    ctx.fillStyle = "black";
    ctx.fillText(avgFixed, x, canvas.height - barHeight - 45);
    ctx.fillText(header, x, canvas.height - 10);

    x += 90;
  });
}

// ---------------------------------------- OPTIONAL FILE UPLOAD ----------------------------------------
document.getElementById('file').addEventListener('change', event => {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    if (typeof toDataTable === 'function') {
      window.currentDataTable = toDataTable(e.target.result, file.name);
      generateReport();
    }
  };
  reader.readAsText(file);
});
</script>

</body>

<script>
  window.addEventListener("load", drawDefaultGraph);
  
  function drawDefaultGraph() {
    const canvas = document.getElementById("graph");
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
  
    // Example: generate LOTS of data (for testing)
    const numPoints = 50; // simulate large dataset
    const labels = Array.from({length: numPoints}, (_, i) => "Item " + (i+1));
    const values = Array.from({length: numPoints}, () => Math.floor(Math.random() * 20) + 1);
  
    const padding = { top: 50, right: 30, bottom: 70, left: 60 };
    const graphWidth = canvas.width - padding.left - padding.right;
    const graphHeight = canvas.height - padding.top - padding.bottom;
  
    // Clear canvas
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  
    // Max value for scaling
    const maxValue = Math.max(...values);
  
    // Draw grid lines (optional, 5 steps)
    ctx.strokeStyle = "rgba(255,255,255,0.1)";
    ctx.lineWidth = 1;
    const numYSteps = 5;
    for (let i = 0; i <= numYSteps; i++) {
      const yVal = (i / numYSteps) * maxValue;
      const yPos = canvas.height - padding.bottom - (yVal / maxValue) * graphHeight;
      ctx.beginPath();
      ctx.moveTo(padding.left, yPos);
      ctx.lineTo(canvas.width - padding.right, yPos);
      ctx.stroke();
  
      // Y-axis labels
      ctx.fillStyle = "white";
      ctx.font = "12px Arial";
      ctx.textAlign = "right";
      ctx.fillText(yVal.toFixed(0), padding.left - 5, yPos + 4);
    }
  
    // Compute bar width dynamically based on data count
    const barSpacing = 10;
    const barWidth = Math.max((graphWidth - (labels.length - 1) * barSpacing) / labels.length, 3);
  
    // Draw bars
    labels.forEach((label, i) => {
      const x = padding.left + i * (barWidth + barSpacing);
      const barHeight = (values[i] / maxValue) * graphHeight;
  
      // Bar
      ctx.fillStyle = "#4facfe";
      ctx.fillRect(x, canvas.height - padding.bottom - barHeight, barWidth, barHeight);
  
      // Value on top
      if (barWidth > 15) { // don't write value if bars are too thin
        ctx.fillStyle = "white";
        ctx.font = "10px Arial";
        ctx.textAlign = "center";
        ctx.fillText(values[i], x + barWidth / 2, canvas.height - padding.bottom - barHeight - 2);
      }
  
      // X-axis labels (rotate if needed)
      ctx.save();
      ctx.translate(x + barWidth / 2, canvas.height - padding.bottom + 5);
      ctx.rotate(-Math.PI / 4); // 45-degree rotation
      ctx.fillStyle = "white";
      ctx.font = "10px Arial";
      ctx.textAlign = "right";
      ctx.fillText(label, 0, 0);
      ctx.restore();
    });
  
    // Draw axes
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    // Y-axis
    ctx.beginPath();
    ctx.moveTo(padding.left, padding.top);
    ctx.lineTo(padding.left, canvas.height - padding.bottom);
    ctx.stroke();
    // X-axis
    ctx.beginPath();
    ctx.moveTo(padding.left, canvas.height - padding.bottom);
    ctx.lineTo(canvas.width - padding.right, canvas.height - padding.bottom);
    ctx.stroke();
  
    // Graph title
    ctx.fillStyle = "white";
    ctx.font = "16px Arial bold";
    ctx.textAlign = "center";
    ctx.fillText("Large Dataset Graph", canvas.width / 2, padding.top / 2);
  
    // Y-axis label
    ctx.save();
    ctx.translate(padding.left - 40, canvas.height / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.textAlign = "center";
    ctx.fillText("Value", 0, 0);
    ctx.restore();
  
    // X-axis label
    ctx.fillStyle = "white";
    ctx.font = "14px Arial";
    ctx.fillText("Items", canvas.width / 2, canvas.height - 10);
  }
  </script>

</html>
