<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Welcome</title>
  <<style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: radial-gradient(circle at top, #2b2b45, #12121a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
  
    .home-container {
      text-align: center;
      padding: 40px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
    }
  
    h1 {
      font-size: 2.8rem;
      margin-bottom: 15px;
    }
  
    p {
      color: #bdbddd;
      margin-bottom: 25px;
    }
  
    button {
      padding: 14px 28px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
      cursor: pointer;
      transition: 0.25s ease;
    }
  
    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.7);
    }
  </style>
</head>
<body>

  <div class="home-container">
    <h1>System Report Dashboard</h1>
    <p>Analyze and visualize your CSV data</p>
    <button onclick="startApp()">Start</button>
  </div>

  <script>
    function startApp() {
      window.location.href = "dashboard.html?from=home";
    }
  </script>

</body>
</html>
